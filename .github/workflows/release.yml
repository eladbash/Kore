name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - run: npm run build

      - name: Build and sign macOS app
        timeout-minutes: 20
        run: npx tauri build --target ${{ matrix.target }} --bundles app
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Notarize
        timeout-minutes: 30
        run: |
          APP_PATH="target/${{ matrix.target }}/release/bundle/macos/kore.app"
          ZIP_PATH="/tmp/kore-notarize.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          # Submit and capture submission ID
          SUBMIT_OUT=$(xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --no-wait 2>&1)
          echo "$SUBMIT_OUT"
          SUB_ID=$(echo "$SUBMIT_OUT" | grep "id:" | head -1 | awk '{print $2}')
          echo "Submission ID: $SUB_ID"

          # Poll with retries
          for i in $(seq 1 60); do
            sleep 15
            STATUS_OUT=$(xcrun notarytool info "$SUB_ID" \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_PASSWORD }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" 2>&1)
            echo "Poll $i: $STATUS_OUT"
            if echo "$STATUS_OUT" | grep -q "status: Accepted"; then
              echo "Notarization accepted!"
              xcrun stapler staple "$APP_PATH"
              exit 0
            elif echo "$STATUS_OUT" | grep -q "status: Invalid"; then
              echo "Notarization rejected!"
              xcrun notarytool log "$SUB_ID" \
                --apple-id "${{ secrets.APPLE_ID }}" \
                --password "${{ secrets.APPLE_PASSWORD }}" \
                --team-id "${{ secrets.APPLE_TEAM_ID }}"
              exit 1
            fi
          done
          echo "Notarization timed out after 15 minutes"
          exit 1

      - name: Create DMG
        run: |
          APP_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          mkdir -p "$DMG_DIR"
          hdiutil create -volname "Kore" -srcfolder "$APP_DIR/kore.app" -ov -format UDZO "$DMG_DIR/kore_$(echo ${{ matrix.target }} | sed 's/-apple-darwin//').dmg"

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Kore ${{ github.ref_name }}"
          body: "See the assets below to download and install Kore."
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - run: npm run build

      - run: npx tauri build --bundles nsis

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Kore ${{ github.ref_name }}"
          body: "See the assets below to download and install Kore."
          files: |
            target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
