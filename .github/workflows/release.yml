name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - run: npm run build

      - name: Build and sign macOS app
        timeout-minutes: 20
        run: npx tauri build --target ${{ matrix.target }} --bundles app
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Notarize
        timeout-minutes: 10
        run: |
          APP_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos/kore.app"
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH" || { echo "Trying without src-tauri prefix..."; APP_PATH="target/${{ matrix.target }}/release/bundle/macos/kore.app"; ls -la "$APP_PATH"; }
          ZIP_PATH="/tmp/kore-notarize.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait --timeout 600 \
            --verbose 2>&1
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        run: |
          APP_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          mkdir -p "$DMG_DIR"
          hdiutil create -volname "Kore" -srcfolder "$APP_DIR/kore.app" -ov -format UDZO "$DMG_DIR/kore_$(echo ${{ matrix.target }} | sed 's/-apple-darwin//').dmg"

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Kore ${{ github.ref_name }}"
          body: "See the assets below to download and install Kore."
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - run: npm run build

      - run: npx tauri build --bundles nsis

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Kore ${{ github.ref_name }}"
          body: "See the assets below to download and install Kore."
          files: |
            target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
